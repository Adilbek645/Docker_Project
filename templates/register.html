<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Регистрация</title>
</head>
<body>
    <div class="auth_container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle at center, #2d2a32, var(--bg-color));">
        <div class="forge_station" style="width: 400px; padding: 40px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h2 class="forge_title" style="margin-bottom: 30px;">НОВЫЙ КУЗНЕЦ</h2>
            
            {% if error %}
            <p style="color: #ff4d4d; margin-bottom: 20px; font-weight: bold; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 5px;">{{ error }}</p>
            {% endif %}
            
            <form method="POST" action="/register" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" name="username" class="sword_input" placeholder="Придумайте имя..." required style="width: 100%; box-sizing: border-box;">
                <input type="password" name="password" class="sword_input" placeholder="Придумайте пароль..." required style="width: 100%; box-sizing: border-box;">
                
                <button type="submit" class="forge_btn" style="margin-top: 20px; width: 100%;">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            </form>
            
            <p style="margin-top: 25px; font-size: 14px; opacity: 0.8;">
                Уже есть кузня? <br><br>
                <a href="/login" class="forge_btn" style="background: var(--bg-card); color: var(--text-main); font-size: 14px; padding: 8px 15px; display: inline-block; text-decoration: none; border: 1px solid var(--border-color);">Войти</a>
            </p>
        </div>
    </div>
</body>
</html>
